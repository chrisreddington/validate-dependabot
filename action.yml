name: 'Validate Dependabot Configuration'
description:
  'Validate that dependabot.yml is configured for all supported languages that
  are present in the repository.'
author: 'chrisreddington'

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: 'package'
  color: 'blue'

inputs:
  github-token:
    description: >
      Personal access token (PAT) used to query the languages used in the
      repository.
    default: ${{ github.token }}
  require-cooldown:
    description: >
      When set to 'true', the action will fail if any ecosystem update entry
      in dependabot.yml is missing a cooldown configuration.
    default: 'false'
  require-groups:
    description: >
      When set to 'true', the action will fail if any ecosystem update entry
      in dependabot.yml has no groups defined.
    default: 'false'

runs:
  using: node24
  main: dist/index.js
